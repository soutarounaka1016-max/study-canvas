name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  test:
    name: Unit and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm test
      - run: npm run build

  browser:
    name: Browser (${{ matrix.project }})
    needs: test
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            browser: chromium
          - project: webkit
            browser: webkit
          - project: ipad-portrait
            browser: webkit
          - project: ipad-landscape
            browser: webkit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run browser checks
        run: npm run test:browser -- --project=${{ matrix.project }}
      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.project }}-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  pages-smoke:
    name: GitHub Pages startup
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: browser
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Wait for and verify published app
        env:
          PLAYWRIGHT_BASE_URL: https://soutarounaka1016-max.github.io/study-canvas/
        run: npm run test:browser -- --project=chromium --grep @published
      - name: Record published-page success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"success\",\"target_url\":\"${RUN_URL}\",\"description\":\"Published Study Canvas started successfully\",\"context\":\"study-canvas/pages-startup\"}"
      - name: Record published-page failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"failure\",\"target_url\":\"${RUN_URL}\",\"description\":\"Published Study Canvas failed to start\",\"context\":\"study-canvas/pages-startup\"}"
      - name: Upload published-page failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-pages-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14
