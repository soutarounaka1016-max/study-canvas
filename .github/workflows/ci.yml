name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Unit and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm test
      - run: npm run build

  browser:
    name: Browser (${{ matrix.project }})
    needs: test
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            browser: chromium
          - project: webkit
            browser: webkit
          - project: ipad-portrait
            browser: webkit
          - project: ipad-landscape
            browser: webkit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run browser checks
        run: npm run test:browser -- --project=${{ matrix.project }}
      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.project }}-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14
