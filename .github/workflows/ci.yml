name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Unit and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm test
      - run: npm run build

  browser:
    name: Browser checks
    needs: test
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      # GitHub標準ランナーでは `playwright install --with-deps` のOS依存処理が長時間停止したため、固定版ブラウザ本体だけを一度取得し、実起動テストで不足を検出する。
      - name: Install Playwright browsers once
        run: npx playwright install chromium webkit
      - name: "Run project: chromium"
        run: npm run test:browser -- --project=chromium
      - name: "Run project: webkit"
        run: npm run test:browser -- --project=webkit
      - name: "Run project: ipad-portrait"
        run: npm run test:browser -- --project=ipad-portrait
      - name: "Run project: ipad-landscape"
        run: npm run test:browser -- --project=ipad-landscape
      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-browser-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14
