name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Record deployment pending
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"pending\",\"target_url\":\"${RUN_URL}\",\"description\":\"Deploying Study Canvas to GitHub Pages\",\"context\":\"study-canvas/pages-deploy\"}"
      - uses: actions/checkout@v4
      - name: Prepare static site
        run: |
          mkdir _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'tests' \
            --exclude 'test-results' \
            --exclude 'playwright-report' \
            --exclude '_site' \
            ./ _site/
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Record deployment success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"success\",\"target_url\":\"${RUN_URL}\",\"description\":\"Study Canvas deployed to GitHub Pages\",\"context\":\"study-canvas/pages-deploy\"}"
      - name: Record deployment failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"failure\",\"target_url\":\"${RUN_URL}\",\"description\":\"Study Canvas Pages deployment failed\",\"context\":\"study-canvas/pages-deploy\"}"

  verify:
    name: Verify published Study Canvas
    needs: deploy
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Record published-page pending
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"pending\",\"target_url\":\"${RUN_URL}\",\"description\":\"Checking published Study Canvas\",\"context\":\"study-canvas/pages-startup\"}"
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify the published app
        env:
          PLAYWRIGHT_BASE_URL: https://soutarounaka1016-max.github.io/study-canvas/
        run: npm run test:browser -- --project=chromium --grep @published
      - name: Record published-page success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"success\",\"target_url\":\"${RUN_URL}\",\"description\":\"Published Study Canvas started successfully\",\"context\":\"study-canvas/pages-startup\"}"
      - name: Record published-page failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"failure\",\"target_url\":\"${RUN_URL}\",\"description\":\"Published Study Canvas failed to start\",\"context\":\"study-canvas/pages-startup\"}"
      - name: Upload published-page failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-pages-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14
